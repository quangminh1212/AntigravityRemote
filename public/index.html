<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntigravityHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            padding: 0 12px;
            background: #111118;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            z-index: 10;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-left .logo {
            font-size: 18px;
        }

        .toolbar-left .title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            transition: background 0.3s;
        }

        .status-dot.online {
            background: #4ade80;
            box-shadow: 0 0 6px #4ade80;
        }

        .status-dot.offline {
            background: #ef4444;
        }

        .status-label {
            font-size: 11px;
            color: #888;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s, color 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .icon-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Canvas container */
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d14;
            overflow: hidden;
            position: relative;
        }

        canvas#remote-canvas {
            transform-origin: center center;
            cursor: default;
            image-rendering: auto;
        }

        /* Hidden textarea for keyboard input (same as ZaloRemote) */
        .hidden-input {
            position: fixed;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            font-size: 16px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #0a0a0f;
            z-index: 5;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }

        .loading-subtext {
            color: #666;
            font-size: 12px;
            margin-top: -8px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30, 30, 50, 0.95);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: none;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Fullscreen */
        .canvas-container:fullscreen {
            background: #000;
        }
    </style>
</head>

<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <span class="logo">⚡</span>
            <span class="title">AntigravityHub</span>
            <div class="status-dot" id="statusDot"></div>
            <span class="status-label" id="statusLabel">Connecting...</span>
        </div>
        <div class="toolbar-right">
            <button class="icon-btn" id="btnRefresh" title="Refresh frame">🔄</button>
            <button class="icon-btn" id="btnFit" title="Fit to screen">📐</button>
            <button class="icon-btn" id="btnFullscreen" title="Fullscreen">⛶</button>
            <button class="icon-btn" id="btnKeyboard" title="Toggle keyboard">⌨️</button>
        </div>
    </div>

    <!-- Canvas (pixel-perfect remote view) -->
    <div class="canvas-container" id="canvasContainer">
        <canvas id="remote-canvas"></canvas>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Connecting to Antigravity...</div>
            <div class="loading-subtext">Make sure Antigravity is running on your PC</div>
        </div>
    </div>

    <!-- Hidden textarea for keyboard input (like ZaloRemote) -->
    <textarea id="hiddenInput" class="hidden-input" autocomplete="off" autocorrect="off" spellcheck="false"
        aria-label="Remote keyboard input" title="Remote keyboard input"></textarea>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (() => {
            // ========== ELEMENTS ==========
            const canvas = document.getElementById('remote-canvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('canvasContainer');
            const hiddenInput = document.getElementById('hiddenInput');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const statusDot = document.getElementById('statusDot');
            const statusLabel = document.getElementById('statusLabel');
            const toastEl = document.getElementById('toast');

            // ========== STATE ==========
            let ws = null;
            let scale = 1;
            let hasFrame = false;
            let viewportW = 1280;
            let viewportH = 800;
            let isComposing = false;
            let reconnectTimer = null;

            // ========== TOAST ==========
            let toastTimeout = null;
            function showToast(msg) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2000);
            }

            // ========== STATUS ==========
            function setStatus(connected) {
                statusDot.className = 'status-dot ' + (connected ? 'online' : 'offline');
                statusLabel.textContent = connected ? 'Connected' : 'Disconnected';
            }

            // ========== SCALE ==========
            function recalcScale() {
                const cw = container.clientWidth;
                const ch = container.clientHeight;
                if (cw > 0 && ch > 0 && viewportW > 0 && viewportH > 0) {
                    scale = Math.min(cw / viewportW, ch / viewportH);
                    canvas.style.transform = `scale(${scale})`;
                }
            }

            const resizeObserver = new ResizeObserver(() => recalcScale());
            resizeObserver.observe(container);

            // ========== DRAW FRAME ==========
            function drawFrame(base64Data) {
                const img = new Image();
                img.onload = () => {
                    if (canvas.width !== img.width || canvas.height !== img.height) {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        viewportW = img.width;
                        viewportH = img.height;
                        recalcScale();
                    }
                    requestAnimationFrame(() => ctx.drawImage(img, 0, 0));

                    if (!hasFrame) {
                        hasFrame = true;
                        loadingOverlay.classList.add('hidden');
                    }
                };
                img.src = 'data:image/jpeg;base64,' + base64Data;
            }

            // ========== COORDINATE CONVERSION ==========
            function getServerCoords(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const x = (clientX - rect.left) / scale;
                const y = (clientY - rect.top) / scale;
                return {
                    x: Math.round(Math.max(0, Math.min(x, viewportW))),
                    y: Math.round(Math.max(0, Math.min(y, viewportH)))
                };
            }

            // ========== WEBSOCKET ==========
            function send(msg) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(msg));
                }
            }

            function connectWS() {
                const params = new URLSearchParams(window.location.search);
                const token = params.get('token') || '';
                const proto = location.protocol === 'https:' ? 'wss' : 'ws';
                const wsUrl = `${proto}://${location.host}/?token=${token}`;

                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    setStatus(true);
                    showToast('✅ Connected');
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        switch (msg.type) {
                            case 'frame':
                                drawFrame(msg.data);
                                break;
                            case 'viewport':
                                viewportW = msg.width || 1280;
                                viewportH = msg.height || 800;
                                recalcScale();
                                break;
                        }
                    } catch (e) { }
                };

                ws.onclose = () => {
                    setStatus(false);
                    if (!reconnectTimer) {
                        reconnectTimer = setTimeout(() => {
                            reconnectTimer = null;
                            connectWS();
                        }, 3000);
                    }
                };

                ws.onerror = () => { };
            }

            // ========== MOUSE/TOUCH INPUT ==========
            // Click
            canvas.addEventListener('click', (e) => {
                e.preventDefault();
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'click', ...coords, button: 'left' });
                focusInput();
            });

            // Double click
            canvas.addEventListener('dblclick', (e) => {
                e.preventDefault();
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'dblclick', ...coords });
                focusInput();
            });

            // Right click
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'click', ...coords, button: 'right' });
            });

            // Scroll (throttled)
            let lastWheelTime = 0;
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const now = Date.now();
                if (now - lastWheelTime < 80) return;
                lastWheelTime = now;
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'scroll', ...coords, deltaX: e.deltaX, deltaY: e.deltaY });
            }, { passive: false });

            // Touch → click (for mobile)
            let touchStartPos = null;
            let touchStartTime = 0;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartPos = { x: touch.clientX, y: touch.clientY };
                touchStartTime = Date.now();
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!touchStartPos) return;
                const touch = e.changedTouches[0];
                const dx = Math.abs(touch.clientX - touchStartPos.x);
                const dy = Math.abs(touch.clientY - touchStartPos.y);
                const dt = Date.now() - touchStartTime;
                // Tap (not swipe)
                if (dx < 15 && dy < 15 && dt < 500) {
                    const coords = getServerCoords(touch.clientX, touch.clientY);
                    send({ type: 'click', ...coords, button: 'left' });
                    focusInput();
                }
                touchStartPos = null;
            }, { passive: false });

            // Touch scroll (2-finger or swipe)
            let lastTouchY = null;
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length >= 2) {
                    // 2-finger scroll
                    const touch = e.touches[0];
                    const coords = getServerCoords(touch.clientX, touch.clientY);
                    if (lastTouchY !== null) {
                        const deltaY = (lastTouchY - touch.clientY) * 2;
                        send({ type: 'scroll', ...coords, deltaX: 0, deltaY });
                    }
                    lastTouchY = touch.clientY;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => { lastTouchY = null; });
            canvas.addEventListener('touchcancel', () => { lastTouchY = null; });

            // ========== KEYBOARD INPUT (same pattern as ZaloRemote) ==========
            function focusInput() {
                hiddenInput.focus();
            }

            // Map special keys
            const keyMap = {
                'Enter': 'Enter', 'Backspace': 'Backspace', 'Delete': 'Delete',
                'Tab': 'Tab', 'Escape': 'Escape', ' ': 'Space',
                'ArrowUp': 'ArrowUp', 'ArrowDown': 'ArrowDown',
                'ArrowLeft': 'ArrowLeft', 'ArrowRight': 'ArrowRight',
                'Home': 'Home', 'End': 'End',
            };

            const modifierOnlyKeys = ['Control', 'Shift', 'Alt', 'Meta', 'AltGraph', 'CapsLock', 'NumLock', 'ScrollLock'];

            hiddenInput.addEventListener('keydown', (e) => {
                if (e.isComposing || isComposing) return;
                if (modifierOnlyKeys.includes(e.key)) return;

                // Let Ctrl+V fall through to paste handler
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') return;

                const modifiers = [];
                if (e.ctrlKey || e.metaKey) modifiers.push('Control');
                if (e.altKey) modifiers.push('Alt');
                if (e.shiftKey && e.key.length > 1) modifiers.push('Shift');

                const mapped = keyMap[e.key];

                if (modifiers.length > 0) {
                    e.preventDefault();
                    const baseKey = mapped || (e.key.length === 1 ? e.key.toLowerCase() : e.key);
                    const combo = [...modifiers, baseKey].join('+');
                    send({ type: 'keydown', key: combo });
                } else if (mapped) {
                    e.preventDefault();
                    send({ type: 'keydown', key: mapped });
                }
            });

            // IME composition (Vietnamese input)
            hiddenInput.addEventListener('compositionstart', () => { isComposing = true; });
            hiddenInput.addEventListener('compositionend', (e) => {
                isComposing = false;
                if (e.data) send({ type: 'type', text: e.data });
                hiddenInput.value = '';
            });

            // Regular character input
            hiddenInput.addEventListener('input', (e) => {
                if (isComposing) return;
                const text = hiddenInput.value;
                if (text) {
                    send({ type: 'type', text });
                    hiddenInput.value = '';
                }
            });

            // Paste handler
            hiddenInput.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData?.getData('text/plain');
                if (text) send({ type: 'type', text });
            });

            // Re-focus on blur
            hiddenInput.addEventListener('blur', () => {
                setTimeout(focusInput, 100);
            });

            // ========== TOOLBAR ACTIONS ==========
            document.getElementById('btnRefresh').addEventListener('click', () => {
                send({ type: 'request_frame' });
                showToast('🔄 Refreshing...');
            });

            document.getElementById('btnFit').addEventListener('click', () => {
                send({ type: 'resize', width: window.innerWidth, height: window.innerHeight - 44 });
                showToast('📐 Fit to screen');
            });

            document.getElementById('btnFullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    container.requestFullscreen().catch(() => { });
                } else {
                    document.exitFullscreen();
                }
            });

            document.getElementById('btnKeyboard').addEventListener('click', () => {
                hiddenInput.focus();
                showToast('⌨️ Keyboard activated');
            });

            // ========== KEEPALIVE ==========
            setInterval(() => send({ type: 'ping' }), 30000);

            // ========== INIT ==========
            connectWS();
        })();
    </script>
</body>

</html>
