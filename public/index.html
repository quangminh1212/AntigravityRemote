<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="AntigravityHub - Remote Chat Viewer for Antigravity AI">
    <title>AntigravityHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a26;
            --border: #2a2a3a;
            --text: #e4e4ec;
            --text-dim: #8888a0;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00d68f;
            --danger: #ff4757;
            --warning: #ffa502;
            --radius: 12px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ===== LAYOUT ===== */
        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
        }

        /* ===== HEADER ===== */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            min-height: 52px;
            flex-shrink: 0;
            z-index: 10;
        }

        #header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        #header .logo-text {
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.3px;
        }

        #status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-dim);
        }

        #status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            transition: background 0.3s ease;
        }

        #status.connected .dot {
            background: var(--success);
            box-shadow: 0 0 6px rgba(0, 214, 143, 0.5);
        }

        #reconnect-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        #reconnect-btn:active {
            background: rgba(108, 92, 231, 0.15);
        }

        /* ===== CHAT VIEWPORT ===== */
        #viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg);
        }

        #chat-frame {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        #chat-content {
            padding: 0;
            min-height: 100%;
        }

        /* Injected snapshot styles */
        #chat-content * {
            max-width: 100% !important;
            box-sizing: border-box !important;
        }

        #chat-content img {
            max-width: 100% !important;
            height: auto !important;
        }

        #chat-content pre,
        #chat-content code {
            white-space: pre-wrap !important;
            word-break: break-word !important;
            overflow-x: auto !important;
        }

        /* ===== INPUT BAR ===== */
        #input-bar {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 12px calc(10px + var(--safe-bottom));
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        #msg-input {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 42px;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.4;
        }

        #msg-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #msg-input::placeholder {
            color: var(--text-dim);
        }

        #send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s, opacity 0.2s;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        #send-btn:active {
            transform: scale(0.9);
        }

        #send-btn:disabled {
            opacity: 0.4;
        }

        #send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ===== LOADING / CONNECTING ===== */
        #loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 20;
            gap: 20px;
            transition: opacity 0.4s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--text-dim);
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }

        .loading-text strong {
            color: var(--text);
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 100;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== SCROLL TO BOTTOM FAB ===== */
        #scroll-bottom {
            position: absolute;
            bottom: 8px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s ease;
            color: var(--text-dim);
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        #scroll-bottom.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== UTILITIES ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span class="logo-text">AntigravityHub</span>
            </div>
            <div id="status">
                <span class="dot"></span>
                <span id="status-text">Connecting...</span>
                <button id="reconnect-btn" title="Reconnect">↻</button>
            </div>
        </header>

        <!-- Chat Viewport -->
        <div id="viewport">
            <div id="chat-frame">
                <div id="chat-content"></div>
            </div>

            <button id="scroll-bottom" title="Scroll to bottom">↓</button>

            <!-- Loading Overlay -->
            <div id="loading-overlay">
                <div class="spinner"></div>
                <div class="loading-text">
                    <strong>Connecting to Antigravity...</strong><br>
                    Make sure Antigravity is running on your PC
                </div>
            </div>
        </div>

        <!-- Input Bar -->
        <div id="input-bar">
            <textarea id="msg-input" placeholder="Type a message..." rows="1" autocomplete="off"
                autocorrect="off"></textarea>
            <button id="send-btn" disabled title="Send">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        (() => {
            'use strict';

            // ===== ELEMENTS =====
            const chatContent = document.getElementById('chat-content');
            const chatFrame = document.getElementById('chat-frame');
            const msgInput = document.getElementById('msg-input');
            const sendBtn = document.getElementById('send-btn');
            const statusEl = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            const reconnectBtn = document.getElementById('reconnect-btn');
            const loadingOverlay = document.getElementById('loading-overlay');
            const scrollBottomBtn = document.getElementById('scroll-bottom');
            const toastEl = document.getElementById('toast');

            // ===== STATE =====
            let ws = null;
            let connected = false;
            let hasSnapshot = false;
            let autoScroll = true;
            let reconnectTimer = null;
            const token = new URLSearchParams(window.location.search).get('token') || '';

            // ===== TOAST =====
            function toast(msg, duration = 2500) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                setTimeout(() => toastEl.classList.remove('show'), duration);
            }

            // ===== STATUS =====
            function setStatus(isConnected, text) {
                connected = isConnected;
                statusEl.className = isConnected ? 'connected' : '';
                statusText.textContent = text || (isConnected ? 'Connected' : 'Disconnected');
                sendBtn.disabled = !isConnected;
            }

            // ===== WEBSOCKET =====
            function connectWebSocket() {
                if (ws && ws.readyState <= 1) return;

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${location.host}/?token=${token}`;

                try {
                    ws = new WebSocket(wsUrl);
                } catch (e) {
                    scheduleReconnect();
                    return;
                }

                ws.onopen = () => {
                    setStatus(true, 'Connected');
                    toast('✅ Connected to Antigravity');
                    clearTimeout(reconnectTimer);
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'snapshot' && msg.data) {
                            renderSnapshot(msg.data);
                        }
                    } catch (e) { }
                };

                ws.onclose = () => {
                    setStatus(false, 'Disconnected');
                    scheduleReconnect();
                };

                ws.onerror = () => {
                    setStatus(false, 'Connection error');
                };
            }

            function scheduleReconnect() {
                clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connectWebSocket, 3000);
            }

            // ===== RENDER SNAPSHOT =====
            function renderSnapshot(snapshot) {
                if (!snapshot.html) return;

                // First snapshot - hide loading
                if (!hasSnapshot) {
                    hasSnapshot = true;
                    loadingOverlay.classList.add('hidden');
                }

                // Remember scroll position
                const wasAtBottom = chatFrame.scrollHeight - chatFrame.scrollTop - chatFrame.clientHeight < 100;

                // Build HTML with original styles
                let styleBlock = '';
                if (snapshot.cssVars) {
                    styleBlock += `<style>:root, :host, html, body { ${snapshot.cssVars} }</style>`;
                }
                if (snapshot.css) {
                    styleBlock += `<style>${snapshot.css}</style>`;
                }
                if (snapshot.backgroundColor) {
                    styleBlock += `<style>
                    #chat-content {
                        background: ${snapshot.backgroundColor};
                        color: ${snapshot.color || '#fff'};
                        font-size: ${snapshot.fontSize || '14px'};
                        font-family: ${snapshot.fontFamily || 'inherit'};
                    }
                </style>`;
                }

                // Mobile responsive overrides
                styleBlock += `<style>
                /* Mobile overrides */
                body, html { overflow: visible !important; height: auto !important; }
                #chat-content * { max-width: 100% !important; }
                #chat-content img { max-width: 100% !important; height: auto !important; object-fit: contain !important; }
                #chat-content pre { overflow-x: auto !important; max-width: 100% !important; }
                #chat-content pre code { white-space: pre-wrap !important; word-break: break-all !important; }
                /* Hide desktop-only elements */
                .titlebar, [id*="titlebar"], .menubar, [id*="menubar"] { display: none !important; }
                /* Fix fixed positioning */
                #chat-content [style*="position: fixed"], #chat-content [style*="position:fixed"] {
                    position: relative !important;
                }
            </style>`;

                chatContent.innerHTML = styleBlock + snapshot.html;

                // Auto-scroll to bottom
                if (wasAtBottom || autoScroll) {
                    requestAnimationFrame(() => {
                        chatFrame.scrollTop = chatFrame.scrollHeight;
                    });
                }
            }

            // ===== SCROLL DETECTION =====
            chatFrame.addEventListener('scroll', () => {
                const distFromBottom = chatFrame.scrollHeight - chatFrame.scrollTop - chatFrame.clientHeight;
                autoScroll = distFromBottom < 100;
                scrollBottomBtn.classList.toggle('show', distFromBottom > 300);
            }, { passive: true });

            scrollBottomBtn.addEventListener('click', () => {
                chatFrame.scrollTop = chatFrame.scrollHeight;
                autoScroll = true;
                scrollBottomBtn.classList.remove('show');
            });

            // ===== TOUCH SCROLL → FORWARD =====
            let touchStartY = 0;
            let lastScrollForward = 0;

            chatFrame.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            chatFrame.addEventListener('touchend', (e) => {
                const dy = touchStartY - e.changedTouches[0].clientY;
                // Only forward significant scrolls, throttled
                if (Math.abs(dy) > 30 && Date.now() - lastScrollForward > 200) {
                    lastScrollForward = Date.now();
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'scroll', deltaY: dy * 2 }));
                    }
                }
            }, { passive: true });

            // ===== CLICK FORWARDING =====
            chatContent.addEventListener('click', (e) => {
                const el = e.target;
                if (!el || !connected) return;

                // Get closest interactive element
                const interactive = el.closest('button, a, [role="button"], [onclick], input, select');
                if (interactive) {
                    e.preventDefault();
                    const text = (interactive.textContent || '').trim().slice(0, 50);
                    const tag = interactive.tagName;

                    fetch(`/click?token=${token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, tag })
                    }).catch(() => { });

                    // Visual feedback
                    interactive.style.opacity = '0.5';
                    setTimeout(() => interactive.style.opacity = '', 200);
                }
            });

            // ===== SEND MESSAGE =====
            async function sendMessage() {
                const msg = msgInput.value.trim();
                if (!msg || !connected) return;

                sendBtn.disabled = true;
                try {
                    const res = await fetch(`/send?token=${token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: msg })
                    });
                    const data = await res.json();
                    if (data.success) {
                        msgInput.value = '';
                        msgInput.style.height = 'auto';
                        autoScroll = true;
                        toast('✅ Message sent');
                    } else {
                        toast('❌ ' + (data.error || 'Send failed'));
                    }
                } catch (e) {
                    toast('❌ Network error');
                }
                sendBtn.disabled = !connected;
            }

            sendBtn.addEventListener('click', sendMessage);

            // Enter to send (Shift+Enter for newline)
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Auto-resize textarea
            msgInput.addEventListener('input', () => {
                msgInput.style.height = 'auto';
                msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
                sendBtn.disabled = !connected || !msgInput.value.trim();
            });

            // ===== RECONNECT BUTTON =====
            reconnectBtn.addEventListener('click', async () => {
                toast('🔄 Reconnecting...');
                try {
                    await fetch(`/connect?token=${token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({})
                    });
                    // Reconnect WebSocket too
                    if (ws) ws.close();
                    setTimeout(connectWebSocket, 500);
                } catch (e) {
                    toast('❌ Reconnect failed');
                }
            });

            // ===== INIT =====
            connectWebSocket();

            // ===== KEEP ALIVE =====
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 30000);

            // ===== PREVENT ZOOM =====
            document.addEventListener('gesturestart', e => e.preventDefault());
            document.addEventListener('gesturechange', e => e.preventDefault());

        })();
    </script>
</body>

</html>
