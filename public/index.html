<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="AntigravityHub — Remote Agent Chat">
  <title>AntigravityHub Remote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #181818;
      --bg-secondary: #1e1e1e;
      --bg-input: #2a2a2a;
      --bg-hover: #2e2e2e;
      --bg-msg: #2a2a2a;
      --text: #d4d4d4;
      --text-secondary: #888;
      --text-muted: #555;
      --text-bright: #e8e8e8;
      --accent: #3b8eea;
      --border: #2e2e2e;
      --scrollbar: #c8a832;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      font-size: 14px;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ═══ Header ═══ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      min-height: 42px;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-btn {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }

    .header-btn:hover {
      background: var(--bg-hover);
      color: var(--text-bright);
    }

    .header-btn .material-icons-round {
      font-size: 16px;
    }

    /* ═══ Main Content ═══ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ═══ Chat Messages ═══ */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    /* Yellow scrollbar like Antigravity */
    .chat-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .chat-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-scroll::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 2px;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      justify-content: flex-end;
      padding: 16px 20px;
      gap: 16px;
    }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 20px 0;
    }

    .welcome-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
    }

    /* User message */
    .msg-user {
      background: var(--bg-msg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-bright);
    }

    /* Assistant message */
    .msg-assistant {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-assistant-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .msg-assistant-body {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }

    .msg-assistant-body code {
      background: var(--bg-input);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      color: #dcdcaa;
      font-family: 'Consolas', 'Fira Code', monospace;
    }

    .msg-assistant-body pre {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
      font-family: 'Consolas', 'Fira Code', monospace;
    }

    .msg-typing {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typing-blink 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing-blink {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    /* ═══ Input Area ═══ */
    .input-area {
      padding: 12px 16px 6px;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .input-box:focus-within {
      border-color: #444;
    }

    .input-textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-bright);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: none;
      outline: none;
      min-height: 20px;
      max-height: 120px;
      line-height: 1.5;
    }

    .input-textarea::placeholder {
      color: var(--text-muted);
    }

    .input-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .input-icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.1s;
    }

    .input-icon-btn:hover {
      color: var(--text-bright);
    }

    .input-icon-btn .material-icons-round {
      font-size: 18px;
    }

    .input-send {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: white;
      transition: opacity 0.15s;
    }

    .input-send:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .input-send .material-icons-round {
      font-size: 16px;
    }

    /* Controls under input */
    .input-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 6px 4px 0;
    }

    .ctrl-pill {
      height: 26px;
      padding: 0 8px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: background 0.1s;
    }

    .ctrl-pill:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .ctrl-pill .material-icons-round {
      font-size: 14px;
    }

    .ctrl-pill.model-pill {
      color: var(--text-secondary);
    }

    /* ═══ Divider ═══ */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    /* ═══ Recent Actions ═══ */
    .recent-section {
      padding: 4px 0;
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .action-row:hover {
      background: var(--bg-hover);
    }

    .action-name {
      font-size: 13px;
      color: var(--text);
    }

    .action-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .action-see-all {
      padding: 8px 20px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .action-see-all:hover {
      color: var(--text-secondary);
    }

    /* ═══ Footer ═══ */
    .footer {
      padding: 10px 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ═══ Bottom bar (status icons) ═══ */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 4px 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      gap: 8px;
    }

    .bottom-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
    }

    .bottom-icon:hover {
      color: var(--text);
    }

    .bottom-icon .material-icons-round {
      font-size: 14px;
    }

    /* ═══ Animations ═══ */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeIn 0.2s ease;
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <span class="header-title">Agent</span>
      <div class="header-actions">
        <button class="header-btn" id="btnNew" title="New chat">
          <span class="material-icons-round">add</span>
        </button>
        <button class="header-btn" id="btnHistory" title="History">
          <span class="material-icons-round">schedule</span>
        </button>
        <button class="header-btn" id="btnMenu" title="Menu">
          <span class="material-icons-round">more_horiz</span>
        </button>
        <button class="header-btn" id="btnClose" title="Close">
          <span class="material-icons-round">close</span>
        </button>
      </div>
    </div>

    <!-- Main content -->
    <div class="main">
      <div class="chat-scroll" id="chatScroll">
        <div class="chat-messages" id="chatMessages">
          <!-- Welcome -->
          <div class="welcome" id="welcome">
            <div class="welcome-title">AntigravityHub</div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-box">
          <textarea class="input-textarea" id="chatInput" rows="1"
            placeholder="mình cần 1 dự án để có thể remote đến antigravity với giao diện y hệt như nàu"></textarea>
          <div class="input-icons">
            <button class="input-icon-btn" id="btnMic" title="Voice">
              <span class="material-icons-round">mic</span>
            </button>
            <button class="input-send" id="btnSend" title="Send" disabled>
              <span class="material-icons-round">arrow_forward</span>
            </button>
          </div>
        </div>
        <div class="input-controls">
          <button class="ctrl-pill" id="btnAttach">
            <span class="material-icons-round">add</span>
          </button>
          <button class="ctrl-pill">
            <span class="material-icons-round">expand_more</span> Fast
          </button>
          <button class="ctrl-pill model-pill">
            <span class="material-icons-round">expand_more</span> Claude Opus 4.6 (Thinking)
          </button>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Recent Actions -->
    <div class="recent-section" id="recentSection">
      <div class="action-row" id="actionClean">
        <span class="action-name">Clean Project Files</span>
        <span class="action-time">2s</span>
      </div>
      <div class="action-row" id="actionRevert">
        <span class="action-name">Revert to Best Commit</span>
        <span class="action-time">4m</span>
      </div>
      <div class="action-row" id="actionFix">
        <span class="action-name">Fix esbuild Module Not Found</span>
        <span class="action-time">13m</span>
      </div>
      <div class="action-see-all">See all</div>
    </div>

    <!-- Footer -->
    <div class="footer">AI may make mistakes. Double-check all generated code.</div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <div class="bottom-icon">
        <span class="material-icons-round">chat_bubble_outline</span>
      </div>
      <div class="bottom-icon">
        <span class="material-icons-round">search</span>
      </div>
    </div>
  </div>

  <script>
    // ─── State ──────────────────────────────────────
    const state = { ws: null, connected: false, cdpPort: 9333, messages: [], waiting: false };

    // ─── DOM ────────────────────────────────────────
    const chatMessages$ = document.getElementById('chatMessages');
    const chatScroll$ = document.getElementById('chatScroll');
    const welcome$ = document.getElementById('welcome');
    const chatInput$ = document.getElementById('chatInput');
    const btnSend$ = document.getElementById('btnSend');

    // ─── Auto-resize textarea ───────────────────────
    chatInput$.addEventListener('input', () => {
      chatInput$.style.height = 'auto';
      chatInput$.style.height = Math.min(chatInput$.scrollHeight, 120) + 'px';
      btnSend$.disabled = !chatInput$.value.trim();
    });

    chatInput$.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    btnSend$.addEventListener('click', sendMessage);

    // ─── WebSocket ──────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      state.ws = new WebSocket(`${proto}://${location.host}/ws`);

      state.ws.onopen = () => { console.log('WS connected'); };

      state.ws.onmessage = (e) => {
        try { handleMessage(JSON.parse(e.data)); }
        catch (err) { console.error('Parse error:', err); }
      };

      state.ws.onclose = () => {
        state.connected = false;
        setTimeout(connectWS, 3000);
      };

      state.ws.onerror = () => { };
    }

    function send(data) {
      if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify(data));
      }
    }

    // ─── Message Handler ────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'status':
          state.connected = msg.connected;
          break;
        case 'chat-response':
          removeTyping();
          addAssistantMsg(msg.text);
          state.waiting = false;
          break;
        case 'chat-error':
          removeTyping();
          addAssistantMsg('⚠️ ' + (msg.error || 'Lỗi không xác định'));
          state.waiting = false;
          break;
      }
    }

    // ─── Send Message ───────────────────────────────
    function sendMessage() {
      const text = chatInput$.value.trim();
      if (!text || state.waiting) return;

      welcome$.style.display = 'none';
      addUserMsg(text);
      chatInput$.value = '';
      chatInput$.style.height = 'auto';
      btnSend$.disabled = true;
      state.waiting = true;

      showTyping();
      send({ type: 'chat', text });
    }

    // ─── Render Messages ────────────────────────────
    function addUserMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg-user animate-in';
      div.textContent = text;
      chatMessages$.appendChild(div);
      scrollToBottom();
    }

    function addAssistantMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg-assistant animate-in';
      div.innerHTML = `
        <div class="msg-assistant-header">AntigravityHub</div>
        <div class="msg-assistant-body">${formatText(text)}</div>
      `;
      chatMessages$.appendChild(div);
      scrollToBottom();
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg-assistant';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-assistant-header">AntigravityHub</div>
        <div class="msg-typing">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatMessages$.appendChild(div);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatScroll$.scrollTop = chatScroll$.scrollHeight;
      });
    }

    function formatText(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    // ─── Actions ────────────────────────────────────
    document.getElementById('actionClean').addEventListener('click', () => {
      send({ type: 'connect' });
      addAssistantMsg('Đang kết nối lại CDP...');
    });

    document.getElementById('actionRevert').addEventListener('click', () => {
      send({ type: 'refresh' });
    });

    document.getElementById('btnNew').addEventListener('click', () => {
      chatMessages$.innerHTML = '';
      chatMessages$.appendChild(welcome$);
      welcome$.style.display = 'flex';
      state.messages = [];
    });

    // ─── Config ─────────────────────────────────────
    async function fetchConfig() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        state.cdpPort = cfg.cdpPort;
      } catch (_) { }
    }

    // ─── Init ───────────────────────────────────────
    fetchConfig();
    connectWS();
  </script>
</body>

</html>
