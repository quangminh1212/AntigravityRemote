<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="AntigravityHub — Remote Agent Chat">
  <title>AntigravityHub Remote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-tertiary: #2e2e2e;
      --bg-input: #333333;
      --bg-hover: #3a3a3a;
      --bg-user-msg: #2a2a2a;
      --text-primary: #e0e0e0;
      --text-secondary: #8a8a8a;
      --text-bright: #f5f5f5;
      --text-muted: #555555;
      --accent: #4a9eff;
      --accent-hover: #5aadff;
      --accent-bg: #2a5a8a;
      --border: #333333;
      --border-light: #444444;
      --success: #4ec9b0;
      --error: #f44747;
      --warning: #dcdcaa;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --radius-full: 50px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      font-size: 14px;
    }

    /* ─── App Layout ───────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ─── Header ───────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      min-height: 44px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .header-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-xs);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .header-btn:hover {
      background: var(--bg-hover);
      color: var(--text-bright);
    }

    .header-btn .material-icons-round {
      font-size: 18px;
    }

    /* ─── Chat Area ────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-area::-webkit-scrollbar {
      width: 4px;
    }

    .chat-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 4px;
    }

    /* Welcome/empty state */
    .chat-welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
    }

    .chat-welcome-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
    }

    .chat-welcome-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.5;
    }

    /* Messages */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-user .msg-content {
      background: var(--bg-user-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) var(--radius-xs) var(--radius);
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-bright);
    }

    .msg-assistant .msg-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .msg-assistant .msg-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
      padding: 0 2px;
    }

    .msg-assistant .msg-content code {
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--warning);
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .msg-assistant .msg-content pre {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      color: var(--text-primary);
    }

    .msg-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 4px 0;
    }

    .msg-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* ─── Input Bar ────────────────────────────────── */
    .input-section {
      padding: 8px 12px 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      gap: 8px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
    }

    .input-textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-bright);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: none;
      outline: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
    }

    .input-textarea::placeholder {
      color: var(--text-muted);
    }

    .input-send {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      background: var(--accent);
      color: white;
    }

    .input-send:hover {
      background: var(--accent-hover);
    }

    .input-send:disabled {
      background: var(--bg-hover);
      color: var(--text-muted);
      cursor: default;
    }

    .input-send .material-icons-round {
      font-size: 18px;
    }

    .input-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-top: 8px;
    }

    .input-ctrl-btn {
      height: 28px;
      padding: 0 10px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }

    .input-ctrl-btn:hover {
      background: var(--bg-hover);
      color: var(--text-bright);
    }

    .input-ctrl-btn .material-icons-round {
      font-size: 14px;
    }

    .input-ctrl-btn.model-btn {
      color: var(--text-secondary);
      border: none;
      padding: 0 8px;
    }

    /* ─── Recent Actions ───────────────────────────── */
    .recent-actions {
      padding: 8px 16px 6px;
      border-top: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .action-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .action-item:hover {
      opacity: 0.8;
    }

    .action-name {
      font-size: 13px;
      color: var(--text-primary);
    }

    .action-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .action-see-all {
      font-size: 12px;
      color: var(--text-muted);
      padding: 6px 0;
      cursor: pointer;
    }

    .action-see-all:hover {
      color: var(--text-secondary);
    }

    /* ─── Footer ───────────────────────────────────── */
    .footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ─── Connection Status Bar ─────────────────────── */
    .connection-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px;
      background: var(--bg-tertiary);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .connection-bar.connected {
      background: rgba(78, 201, 176, 0.1);
      color: var(--success);
    }

    .connection-bar.error {
      background: rgba(244, 71, 71, 0.1);
      color: var(--error);
    }

    .connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--error);
    }

    .connection-bar.connected .connection-dot {
      background: var(--success);
    }

    /* ─── Spinner ──────────────────────────────────── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- Connection Status -->
    <div class="connection-bar" id="connectionBar">
      <div class="connection-dot"></div>
      <span id="connectionText">Đang kết nối...</span>
    </div>

    <!-- Header -->
    <div class="header">
      <span class="header-title">Agent</span>
      <div class="header-actions">
        <button class="header-btn" id="btnNew" title="New chat">
          <span class="material-icons-round">add</span>
        </button>
        <button class="header-btn" id="btnHistory" title="History">
          <span class="material-icons-round">schedule</span>
        </button>
        <button class="header-btn" id="btnMenu" title="Menu">
          <span class="material-icons-round">more_horiz</span>
        </button>
        <button class="header-btn" id="btnClose" title="Close">
          <span class="material-icons-round">close</span>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="chat-welcome" id="chatWelcome">
        <div class="chat-welcome-title">AntigravityHub</div>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-box">
        <textarea class="input-textarea" id="chatInput" rows="1" placeholder="Nhập tin nhắn cho Agent..."></textarea>
        <button class="input-send" id="btnSend" title="Send" disabled>
          <span class="material-icons-round">arrow_forward</span>
        </button>
      </div>
      <div class="input-controls">
        <button class="input-ctrl-btn" id="btnAttach">
          <span class="material-icons-round">add</span>
        </button>
        <button class="input-ctrl-btn">
          <span class="material-icons-round">expand_more</span> Fast
        </button>
        <button class="input-ctrl-btn model-btn">
          <span class="material-icons-round">expand_more</span> Claude Opus 4.6 (Thinking)
        </button>
        <button class="input-ctrl-btn" id="btnMic" style="margin-left:auto; border:none;">
          <span class="material-icons-round">mic</span>
        </button>
      </div>
    </div>

    <!-- Recent Actions -->
    <div class="recent-actions" id="recentActions">
      <div class="action-item" id="actionReconnect">
        <span class="action-name">Reconnect CDP</span>
        <span class="action-time" id="reconnectTime">-</span>
      </div>
      <div class="action-item" id="actionRefresh">
        <span class="action-name">Refresh Screenshot</span>
        <span class="action-time">-</span>
      </div>
      <div class="action-see-all">See all</div>
    </div>

    <!-- Footer -->
    <div class="footer">
      AI may make mistakes. Double-check all generated code.
    </div>
  </div>

  <script>
    // ─── App State ──────────────────────────────────
    const state = {
      ws: null,
      connected: false,
      cdpPort: 9333,
      messages: [],
      waiting: false,
    };

    // ─── DOM ────────────────────────────────────────
    const chatArea$ = document.getElementById('chatArea');
    const chatWelcome$ = document.getElementById('chatWelcome');
    const chatInput$ = document.getElementById('chatInput');
    const btnSend$ = document.getElementById('btnSend');
    const connectionBar$ = document.getElementById('connectionBar');
    const connectionText$ = document.getElementById('connectionText');

    // ─── Auto-resize textarea ───────────────────────
    chatInput$.addEventListener('input', () => {
      chatInput$.style.height = 'auto';
      chatInput$.style.height = Math.min(chatInput$.scrollHeight, 120) + 'px';
      btnSend$.disabled = !chatInput$.value.trim();
    });

    chatInput$.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    btnSend$.addEventListener('click', sendMessage);

    // ─── WebSocket ──────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      state.ws = new WebSocket(`${proto}://${location.host}/ws`);

      state.ws.onopen = () => {
        updateConnection('connecting', 'WebSocket connected, checking CDP...');
      };

      state.ws.onmessage = (e) => {
        try { handleMessage(JSON.parse(e.data)); }
        catch (err) { console.error('WS parse error:', err); }
      };

      state.ws.onclose = () => {
        state.connected = false;
        updateConnection('error', 'Mất kết nối. Đang thử lại...');
        setTimeout(connectWS, 3000);
      };

      state.ws.onerror = () => { };
    }

    function send(data) {
      if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify(data));
      }
    }

    // ─── Handle Messages ────────────────────────────
    function handleMessage(msg) {
      switch (msg.type) {
        case 'status':
          state.connected = msg.connected;
          if (msg.connected) {
            updateConnection('connected', 'Đã kết nối Antigravity');
          } else {
            updateConnection('error', 'CDP chưa kết nối — khởi chạy Antigravity với --remote-debugging-port');
          }
          break;

        case 'chat-response':
          removeTypingIndicator();
          addMessage('assistant', msg.text);
          state.waiting = false;
          break;

        case 'chat-error':
          removeTypingIndicator();
          addMessage('assistant', '⚠️ ' + (msg.error || 'Lỗi không xác định'));
          state.waiting = false;
          break;

        case 'frame':
          // Ignore frames in chat mode
          break;
      }
    }

    // ─── Connection UI ──────────────────────────────
    function updateConnection(status, text) {
      connectionBar$.className = 'connection-bar ' + (status === 'connected' ? 'connected' : status === 'error' ? 'error' : '');
      connectionText$.textContent = text;
    }

    // ─── Messages ───────────────────────────────────
    function sendMessage() {
      const text = chatInput$.value.trim();
      if (!text || state.waiting) return;

      chatWelcome$.style.display = 'none';
      addMessage('user', text);
      chatInput$.value = '';
      chatInput$.style.height = 'auto';
      btnSend$.disabled = true;
      state.waiting = true;

      // Show typing indicator
      showTypingIndicator();

      // Send to server for CDP execution
      send({ type: 'chat', text });
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg msg-' + role;

      if (role === 'user') {
        div.innerHTML = `<div class="msg-content">${escapeHtml(text)}</div>`;
      } else {
        div.innerHTML = `
          <div class="msg-header">AntigravityHub</div>
          <div class="msg-content">${formatResponse(text)}</div>
        `;
      }

      chatArea$.appendChild(div);
      chatArea$.scrollTop = chatArea$.scrollHeight;
      state.messages.push({ role, text });
    }

    function showTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'msg msg-assistant';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-header">AntigravityHub</div>
        <div class="msg-status"><div class="dot"></div> Thinking...</div>
      `;
      chatArea$.appendChild(div);
      chatArea$.scrollTop = chatArea$.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function formatResponse(text) {
      // Basic markdown-like formatting
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    // ─── Actions ────────────────────────────────────
    document.getElementById('actionReconnect').addEventListener('click', () => {
      send({ type: 'connect' });
      updateConnection('connecting', 'Đang kết nối lại...');
    });

    document.getElementById('actionRefresh').addEventListener('click', () => {
      send({ type: 'refresh' });
    });

    document.getElementById('btnNew').addEventListener('click', () => {
      chatArea$.innerHTML = '';
      chatArea$.appendChild(chatWelcome$);
      chatWelcome$.style.display = 'flex';
      state.messages = [];
    });

    // ─── Fetch Config ───────────────────────────────
    async function fetchConfig() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        state.cdpPort = cfg.cdpPort;
      } catch (_) { }
    }

    // ─── Init ───────────────────────────────────────
    fetchConfig();
    connectWS();
  </script>
</body>

</html>
