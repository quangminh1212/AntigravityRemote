<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntigravityHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1e1e;
            color: #cccccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            padding: 0 12px;
            background: #252526;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            z-index: 10;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-left .logo {
            width: 18px;
            height: 18px;
        }

        .toolbar-left .logo svg {
            width: 18px;
            height: 18px;
            fill: #cccccc;
        }

        .toolbar-left .title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            transition: background 0.3s;
        }

        .status-dot.online {
            background: #89d185;
            box-shadow: 0 0 6px #89d185;
        }

        .status-dot.offline {
            background: #ef4444;
        }

        .status-label {
            font-size: 11px;
            color: #888;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
            fill: #aaa;
            transition: fill 0.2s;
        }

        .icon-btn:hover svg {
            fill: #e0e0e0;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .icon-btn:active {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Canvas container */
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            overflow: hidden;
            position: relative;
        }

        canvas#remote-canvas {
            transform-origin: center center;
            cursor: default;
            image-rendering: auto;
        }

        /* Hidden textarea for keyboard input */
        .hidden-input {
            position: fixed;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            font-size: 16px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #1e1e1e;
            z-index: 5;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: #0078d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }

        .loading-subtext {
            color: #666;
            font-size: 12px;
            margin-top: -8px;
        }

        /* Bottom Tab Bar */
        .tab-bar {
            display: flex;
            height: 56px;
            background: #252526;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            z-index: 10;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            border: none;
            background: transparent;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .tab-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 32px;
            height: 3px;
            border-radius: 0 0 3px 3px;
            background: #0078d4;
            transition: transform 0.25s ease;
        }

        .tab-item.active {
            color: #0078d4;
        }

        .tab-item.active::before {
            transform: translateX(-50%) scaleX(1);
        }

        .tab-item svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .tab-item .tab-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .tab-item:active {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 72px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(37, 37, 38, 0.95);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: none;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Fullscreen */
        .canvas-container:fullscreen {
            background: #1e1e1e;
        }
    </style>
</head>

<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <span class="logo"><svg viewBox="0 0 24 24">
                    <path
                        d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z" />
                </svg></span>
            <span class="title">AntigravityHub</span>
            <div class="status-dot" id="statusDot"></div>
            <span class="status-label" id="statusLabel">Connecting...</span>
        </div>
        <div class="toolbar-right">
            <button class="icon-btn" id="btnRefresh" title="Refresh"><svg viewBox="0 0 24 24">
                    <path
                        d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg></button>
            <button class="icon-btn" id="btnFullscreen" title="Fullscreen"><svg viewBox="0 0 24 24">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg></button>
            <button class="icon-btn" id="btnKeyboard" title="Keyboard"><svg viewBox="0 0 24 24">
                    <path
                        d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z" />
                </svg></button>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-container" id="canvasContainer">
        <canvas id="remote-canvas"></canvas>
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <div class="loading-text" id="loadingText">Connecting to Antigravity...</div>
            <div class="loading-subtext" id="loadingSubText">Make sure Antigravity is running on your PC</div>
        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="tab-bar">
        <button class="tab-item active" data-view="chat">
            <svg viewBox="0 0 24 24">
                <path
                    d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z" />
            </svg>
            <span class="tab-label">Chat</span>
        </button>
        <button class="tab-item" data-view="editor">
            <svg viewBox="0 0 24 24">
                <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" />
            </svg>
            <span class="tab-label">Editor</span>
        </button>
        <button class="tab-item" data-view="explorer">
            <svg viewBox="0 0 24 24">
                <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" />
            </svg>
            <span class="tab-label">Explorer</span>
        </button>
    </div>

    <!-- Hidden textarea for keyboard input -->
    <textarea id="hiddenInput" class="hidden-input" autocomplete="off" autocorrect="off" spellcheck="false"
        aria-label="Remote keyboard input" title="Remote keyboard input"></textarea>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (() => {
            const canvas = document.getElementById('remote-canvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('canvasContainer');
            const hiddenInput = document.getElementById('hiddenInput');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const loadingSubText = document.getElementById('loadingSubText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const statusDot = document.getElementById('statusDot');
            const statusLabel = document.getElementById('statusLabel');
            const toastEl = document.getElementById('toast');

            // ========== STATE ==========
            let ws = null;
            let scale = 1;
            let hasFrame = false;
            let viewportW = 1280;
            let viewportH = 800;
            let isComposing = false;
            let reconnectTimer = null;
            let allCrops = null;
            let activeView = 'chat';
            let lastFrameBase64 = null;

            function getActiveCrop() {
                return allCrops ? (allCrops[activeView] || null) : null;
            }

            // ========== TOAST ==========
            let toastTimeout = null;
            function showToast(msg) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2000);
            }

            // ========== STATUS ==========
            function setStatus(connected) {
                statusDot.className = 'status-dot ' + (connected ? 'online' : 'offline');
                statusLabel.textContent = connected ? 'Connected' : 'Disconnected';
            }

            // ========== SCALE ==========
            function recalcScale() {
                const cw = container.clientWidth;
                const ch = container.clientHeight;
                if (cw > 0 && ch > 0 && viewportW > 0 && viewportH > 0) {
                    scale = Math.min(cw / viewportW, ch / viewportH);
                    canvas.style.transform = `scale(${scale})`;
                }
            }

            const resizeObserver = new ResizeObserver(() => recalcScale());
            resizeObserver.observe(container);

            // ========== LOADING ==========
            function updateLoadingForView() {
                const crop = getActiveCrop();
                if (crop && crop.ok && hasFrame) {
                    loadingOverlay.classList.add('hidden');
                    loadingOverlay.style.display = 'none';
                } else if (allCrops && !(crop && crop.ok)) {
                    const msgs = {
                        chat: ['Vui lòng mở khung Chat trong IDE', '(Bấm vào tab Antigravity để mở)'],
                        editor: ['Editor không hiển thị', '(Hãy mở 1 file trong IDE)'],
                        explorer: ['Sidebar không hiển thị', '(Hãy mở Explorer trong IDE)']
                    };
                    const [t, s] = msgs[activeView] || ['Đang tải...', ''];
                    loadingOverlay.style.display = 'flex';
                    loadingOverlay.classList.remove('hidden');
                    loadingText.textContent = t;
                    loadingSubText.textContent = s;
                    loadingSpinner.style.display = 'none';
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    hasFrame = false;
                }
            }

            // ========== DRAW FRAME ==========
            function drawFrame(base64Data) {
                lastFrameBase64 = base64Data;
                const crop = getActiveCrop();
                if (!crop || !crop.ok) return;

                const img = new Image();
                img.onload = () => {
                    if (crop.w > 0 && crop.h > 0) {
                        if (canvas.width !== crop.w || canvas.height !== crop.h) {
                            canvas.width = crop.w;
                            canvas.height = crop.h;
                            viewportW = crop.w;
                            viewportH = crop.h;
                            recalcScale();
                        }
                        requestAnimationFrame(() => ctx.drawImage(img, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h));
                    } else {
                        if (canvas.width !== img.width || canvas.height !== img.height) {
                            canvas.width = img.width;
                            canvas.height = img.height;
                            viewportW = img.width;
                            viewportH = img.height;
                            recalcScale();
                        }
                        requestAnimationFrame(() => ctx.drawImage(img, 0, 0));
                    }
                    if (!hasFrame) {
                        hasFrame = true;
                        loadingOverlay.classList.add('hidden');
                        loadingOverlay.style.display = 'none';
                    }
                };
                img.src = 'data:image/jpeg;base64,' + base64Data;
            }

            // ========== COORDINATE CONVERSION (with crop offset) ==========
            function getServerCoords(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const x = (clientX - rect.left) / scale;
                const y = (clientY - rect.top) / scale;
                const crop = getActiveCrop();
                const ox = (crop && crop.ok) ? crop.x : 0;
                const oy = (crop && crop.ok) ? crop.y : 0;
                return {
                    x: Math.round(Math.max(0, x) + ox),
                    y: Math.round(Math.max(0, y) + oy)
                };
            }

            // ========== WEBSOCKET ==========
            function send(msg) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(msg));
                }
            }

            function connectWS() {
                const params = new URLSearchParams(window.location.search);
                const token = params.get('token') || '';
                const proto = location.protocol === 'https:' ? 'wss' : 'ws';
                const wsUrl = `${proto}://${location.host}/?token=${token}`;

                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    setStatus(true);
                    showToast('Connected');
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);

                        if (msg.type === 'crops') {
                            allCrops = msg.data;
                            updateLoadingForView();
                            // Redraw with current frame if available
                            if (lastFrameBase64) drawFrame(lastFrameBase64);
                            return;
                        }

                        if (msg.type === 'frame') {
                            drawFrame(msg.data);
                            return;
                        }

                        if (msg.type === 'viewport') {
                            return;
                        }
                    } catch (e) { }
                };

                ws.onclose = () => {
                    setStatus(false);
                    if (!reconnectTimer) {
                        reconnectTimer = setTimeout(() => {
                            reconnectTimer = null;
                            connectWS();
                        }, 3000);
                    }
                };

                ws.onerror = () => { };
            }

            // ========== TAB SWITCHING ==========
            const tabItems = document.querySelectorAll('.tab-item');
            tabItems.forEach(tab => {
                tab.addEventListener('click', () => {
                    const view = tab.dataset.view;
                    if (view === activeView) return;

                    activeView = view;
                    tabItems.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    hasFrame = false;
                    updateLoadingForView();

                    // Redraw with cached frame using new crop
                    if (lastFrameBase64) drawFrame(lastFrameBase64);

                    const labels = { chat: 'Chat', editor: 'Editor', explorer: 'Explorer' };
                    showToast(labels[view] || view);
                });
            });

            // ========== MOUSE/TOUCH INPUT ==========
            canvas.addEventListener('click', (e) => {
                e.preventDefault();
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'click', ...coords, button: 'left' });
                focusInput();
            });

            canvas.addEventListener('dblclick', (e) => {
                e.preventDefault();
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'dblclick', ...coords });
                focusInput();
            });

            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'click', ...coords, button: 'right' });
            });

            let lastWheelTime = 0;
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const now = Date.now();
                if (now - lastWheelTime < 80) return;
                lastWheelTime = now;
                const coords = getServerCoords(e.clientX, e.clientY);
                send({ type: 'scroll', ...coords, deltaX: e.deltaX, deltaY: e.deltaY });
            }, { passive: false });

            // Touch tap
            let touchStartPos = null;
            let touchStartTime = 0;
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartPos = { x: touch.clientX, y: touch.clientY };
                touchStartTime = Date.now();
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!touchStartPos) return;
                const touch = e.changedTouches[0];
                const dx = Math.abs(touch.clientX - touchStartPos.x);
                const dy = Math.abs(touch.clientY - touchStartPos.y);
                const dt = Date.now() - touchStartTime;
                if (dx < 15 && dy < 15 && dt < 500) {
                    const coords = getServerCoords(touch.clientX, touch.clientY);
                    send({ type: 'click', ...coords, button: 'left' });
                    focusInput();
                }
                touchStartPos = null;
            }, { passive: false });

            // Touch scroll (2-finger)
            let lastTouchY = null;
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (e.touches.length >= 2) {
                    const touch = e.touches[0];
                    const coords = getServerCoords(touch.clientX, touch.clientY);
                    if (lastTouchY !== null) {
                        const deltaY = (lastTouchY - touch.clientY) * 2;
                        send({ type: 'scroll', ...coords, deltaX: 0, deltaY });
                    }
                    lastTouchY = touch.clientY;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', () => { lastTouchY = null; });
            canvas.addEventListener('touchcancel', () => { lastTouchY = null; });

            // ========== KEYBOARD INPUT ==========
            function focusInput() {
                hiddenInput.focus();
            }

            const keyMap = {
                'Enter': 'Enter', 'Backspace': 'Backspace', 'Delete': 'Delete',
                'Tab': 'Tab', 'Escape': 'Escape',
                'ArrowUp': 'ArrowUp', 'ArrowDown': 'ArrowDown',
                'ArrowLeft': 'ArrowLeft', 'ArrowRight': 'ArrowRight',
                'Home': 'Home', 'End': 'End',
            };

            const modifierOnlyKeys = ['Control', 'Shift', 'Alt', 'Meta', 'AltGraph', 'CapsLock', 'NumLock', 'ScrollLock'];

            hiddenInput.addEventListener('keydown', (e) => {
                if (e.isComposing || isComposing) return;
                if (modifierOnlyKeys.includes(e.key)) return;
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') return;

                const modifiers = [];
                if (e.ctrlKey || e.metaKey) modifiers.push('Control');
                if (e.altKey) modifiers.push('Alt');
                if (e.shiftKey && e.key.length > 1) modifiers.push('Shift');

                const mapped = keyMap[e.key];

                if (modifiers.length > 0) {
                    e.preventDefault();
                    const baseKey = mapped || (e.key === ' ' ? 'Space' : (e.key.length === 1 ? e.key.toLowerCase() : e.key));
                    const combo = [...modifiers, baseKey].join('+');
                    send({ type: 'keydown', key: combo });
                } else if (mapped) {
                    e.preventDefault();
                    send({ type: 'keydown', key: mapped });
                }
            });

            hiddenInput.addEventListener('compositionstart', () => { isComposing = true; });
            hiddenInput.addEventListener('compositionend', (e) => {
                isComposing = false;
                if (e.data) send({ type: 'type', text: e.data });
                hiddenInput.value = '';
            });

            hiddenInput.addEventListener('input', (e) => {
                if (isComposing) return;
                const text = hiddenInput.value;
                if (text) {
                    send({ type: 'type', text });
                    hiddenInput.value = '';
                }
            });

            hiddenInput.addEventListener('paste', (e) => {
                e.preventDefault();
                const text = e.clipboardData?.getData('text/plain');
                if (text) send({ type: 'type', text });
            });

            hiddenInput.addEventListener('blur', () => {
                setTimeout(focusInput, 100);
            });

            // ========== TOOLBAR ACTIONS ==========
            document.getElementById('btnRefresh').addEventListener('click', () => {
                send({ type: 'request_frame' });
                showToast('Refreshing...');
            });

            document.getElementById('btnFullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    container.requestFullscreen().catch(() => { });
                } else {
                    document.exitFullscreen();
                }
            });

            document.getElementById('btnKeyboard').addEventListener('click', () => {
                hiddenInput.focus();
                showToast('⌨️ Keyboard');
            });

            // ========== KEEPALIVE ==========
            setInterval(() => send({ type: 'ping' }), 30000);

            // ========== INIT ==========
            connectWS();
        })();
    </script>
</body>

</html>
