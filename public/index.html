<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Antigravity Remote</title>
  <link rel="icon" type="image/png" href="/image.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text2: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    /* ═══ Layout ═══ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding-top: var(--safe-top);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
      min-height: 40px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: 0.3s;
    }

    .status-dot.ok {
      background: var(--green);
    }

    .toolbar-title {
      font-size: 13px;
      font-weight: 600;
    }

    .toolbar-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
    }

    .toolbar-btn:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .toolbar-btn.active {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
    }

    /* ═══ Remote View ═══ */
    .remote-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #000;
      touch-action: none;
      /* Prevent browser gestures */
    }

    #remoteScreen {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: auto;
      cursor: crosshair;
      display: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .placeholder {
      text-align: center;
      color: var(--text2);
      padding: 20px;
    }

    .placeholder .material-icons-round {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
      color: var(--accent);
      opacity: 0.5;
    }

    .placeholder p {
      font-size: 13px;
      margin: 4px 0;
    }

    /* ═══ Keyboard Input Bar ═══ */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding-bottom: max(8px, var(--safe-bottom));
    }

    .input-field {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      caret-color: var(--accent);
    }

    .input-field:focus {
      border-color: var(--accent);
    }

    .input-field::placeholder {
      color: var(--text2);
    }

    /* ═══ Status Bar ═══ */
    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text2);
      flex-shrink: 0;
    }

    .fps-badge {
      color: var(--green);
      font-weight: 600;
    }

    /* ═══ Overlay ═══ */
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    /* ═══ Cursor indicator ═══ */
    .cursor-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(88, 166, 255, 0.6);
      border: 2px solid rgba(88, 166, 255, 0.9);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      display: none;
      transition: opacity 0.2s;
    }

    @keyframes tapPulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    .tap-ring {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      pointer-events: none;
      z-index: 5;
      animation: tapPulse 0.4s ease-out forwards;
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="status-dot" id="statusDot"></div>
        <span class="toolbar-title">Antigravity Remote</span>
      </div>
      <div class="toolbar-right">
        <button class="toolbar-btn" id="btnStream" title="Bật/tắt stream">
          <span class="material-icons-round" style="font-size:20px">play_arrow</span>
        </button>
        <button class="toolbar-btn" id="btnRefresh" title="Refresh screenshot">
          <span class="material-icons-round" style="font-size:20px">refresh</span>
        </button>
        <button class="toolbar-btn" id="btnKeyboard" title="Bàn phím">
          <span class="material-icons-round" style="font-size:20px">keyboard</span>
        </button>
        <button class="toolbar-btn" id="btnReconnect" title="Reconnect CDP">
          <span class="material-icons-round" style="font-size:20px">sync</span>
        </button>
      </div>
    </div>

    <!-- Remote Desktop View -->
    <div class="remote-container" id="remoteContainer">
      <img id="remoteScreen" alt="Remote Screen">
      <div class="cursor-dot" id="cursorDot"></div>
      <div class="placeholder" id="placeholder">
        <span class="material-icons-round">connected_tv</span>
        <p><strong>Antigravity Remote Desktop</strong></p>
        <p>Đang kết nối CDP...</p>
      </div>
    </div>

    <!-- Keyboard Input -->
    <div class="input-bar">
      <input type="text" class="input-field" id="keyInput" placeholder="Gõ ở đây để nhập vào Antigravity..."
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="toolbar-btn" id="btnEnter" title="Enter">
        <span class="material-icons-round" style="font-size:20px;color:var(--accent)">send</span>
      </button>
    </div>

    <!-- Status Bar -->
    <div class="statusbar">
      <span id="statusText">Đang kết nối...</span>
      <span><span class="fps-badge" id="fpsText">0 FPS</span> · <span id="cdpInfo">CDP: --</span></span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function () {
      'use strict';

      // ─── State ───
      const state = {
        connected: false,
        streaming: false,
        viewport: { width: 1920, height: 1080 },
        frameCount: 0,
        lastFpsUpdate: Date.now(),
        fps: 0,
      };

      // ─── DOM ───
      const img = document.getElementById('remoteScreen');
      const container = document.getElementById('remoteContainer');
      const placeholder = document.getElementById('placeholder');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const fpsText = document.getElementById('fpsText');
      const cdpInfo = document.getElementById('cdpInfo');
      const keyInput = document.getElementById('keyInput');
      const cursorDot = document.getElementById('cursorDot');
      const toast = document.getElementById('toast');

      // ─── WebSocket ───
      const wsUrl = `ws://${location.host}/ws`;
      let ws = null;

      function connect() {
        ws = new WebSocket(wsUrl);
        ws.onopen = () => {
          ws.send(JSON.stringify({ type: 'connect' }));
          showToast('Đang kết nối CDP...');
        };
        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          switch (msg.type) {
            case 'status':
              state.connected = msg.connected;
              state.viewport = msg.viewport || state.viewport;
              statusDot.className = 'status-dot' + (msg.connected ? ' ok' : '');
              statusText.textContent = msg.connected ? 'Đã kết nối' : 'Chưa kết nối';
              cdpInfo.textContent = 'CDP: ' + (msg.connected ? '✓' : '✗');
              if (msg.connected) {
                showToast('✅ Kết nối thành công!');
                // Auto-start streaming
                if (!state.streaming) toggleStream();
              }
              break;

            case 'frame':
              img.src = 'data:image/jpeg;base64,' + msg.data;
              img.style.display = 'block';
              placeholder.style.display = 'none';
              // FPS counter
              state.frameCount++;
              const now = Date.now();
              if (now - state.lastFpsUpdate > 1000) {
                state.fps = Math.round(state.frameCount * 1000 / (now - state.lastFpsUpdate));
                fpsText.textContent = state.fps + ' FPS';
                state.frameCount = 0;
                state.lastFpsUpdate = now;
              }
              break;

            case 'viewport':
              state.viewport = msg.viewport || state.viewport;
              break;
          }
        };
        ws.onclose = () => {
          state.connected = false;
          state.streaming = false;
          statusDot.className = 'status-dot';
          statusText.textContent = 'Mất kết nối...';
          showToast('⚠️ Mất kết nối, đang thử lại...');
          setTimeout(connect, 3000);
        };
      }

      // ─── Coordinate mapping ───
      function mapCoords(clientX, clientY) {
        const rect = img.getBoundingClientRect();
        const scaleX = state.viewport.width / rect.width;
        const scaleY = state.viewport.height / rect.height;
        return {
          x: Math.round((clientX - rect.left) * scaleX),
          y: Math.round((clientY - rect.top) * scaleY),
        };
      }

      function isOnImage(clientX, clientY) {
        const rect = img.getBoundingClientRect();
        return clientX >= rect.left && clientX <= rect.right &&
          clientY >= rect.top && clientY <= rect.bottom;
      }

      // ─── Mouse/Touch Events ───
      // Desktop: click
      img.addEventListener('click', (e) => {
        e.preventDefault();
        const { x, y } = mapCoords(e.clientX, e.clientY);
        send({ type: 'click', x, y });
        showTapRing(e.clientX, e.clientY);
      });

      // Desktop: scroll
      container.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (!isOnImage(e.clientX, e.clientY)) return;
        const { x, y } = mapCoords(e.clientX, e.clientY);
        send({ type: 'scroll', x, y, deltaX: e.deltaX, deltaY: e.deltaY });
      }, { passive: false });

      // Touch: tap, drag
      let touchStartTime = 0;
      let touchStartPos = null;
      let isTouchDrag = false;

      container.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (e.touches.length !== 1) return;
        const t = e.touches[0];
        if (!isOnImage(t.clientX, t.clientY)) return;
        touchStartTime = Date.now();
        touchStartPos = { x: t.clientX, y: t.clientY };
        isTouchDrag = false;
        const { x, y } = mapCoords(t.clientX, t.clientY);
        send({ type: 'mousedown', x, y });
        showCursor(t.clientX, t.clientY);
      }, { passive: false });

      container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length !== 1 || !touchStartPos) return;
        const t = e.touches[0];
        const dx = t.clientX - touchStartPos.x;
        const dy = t.clientY - touchStartPos.y;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) isTouchDrag = true;

        if (isTouchDrag) {
          // Scroll mode: translate touch movement to scroll
          const { x, y } = mapCoords(t.clientX, t.clientY);
          send({ type: 'scroll', x, y, deltaX: -dx * 2, deltaY: -dy * 2 });
          touchStartPos = { x: t.clientX, y: t.clientY };
        }
        showCursor(t.clientX, t.clientY);
      }, { passive: false });

      container.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (!touchStartPos) return;
        const duration = Date.now() - touchStartTime;
        if (!isTouchDrag && duration < 300) {
          // Quick tap → click
          const { x, y } = mapCoords(touchStartPos.x, touchStartPos.y);
          send({ type: 'click', x, y });
          showTapRing(touchStartPos.x, touchStartPos.y);
        } else {
          const ct = e.changedTouches[0];
          const { x, y } = mapCoords(ct.clientX, ct.clientY);
          send({ type: 'mouseup', x, y });
        }
        hideCursor();
        touchStartPos = null;
      }, { passive: false });

      // ─── Keyboard Input ───
      keyInput.addEventListener('input', (e) => {
        const text = e.target.value;
        if (text.length > 0) {
          // Send each new character
          const lastChar = text.slice(-1);
          send({ type: 'key', text: lastChar });
        }
      });

      keyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          // Send Enter key
          send({ type: 'key', key: 'Enter', code: 'Enter' });
          keyInput.value = '';
        } else if (e.key === 'Backspace') {
          e.preventDefault();
          send({ type: 'key', key: 'Backspace', code: 'Backspace' });
          // Remove last char from input
          keyInput.value = keyInput.value.slice(0, -1);
        } else if (e.key === 'Escape') {
          e.preventDefault();
          send({ type: 'key', key: 'Escape', code: 'Escape' });
          keyInput.blur();
        } else if (e.key === 'Tab') {
          e.preventDefault();
          send({ type: 'key', key: 'Tab', code: 'Tab' });
        } else if (e.key.startsWith('Arrow')) {
          e.preventDefault();
          send({ type: 'key', key: e.key, code: e.code });
        }
      });

      // ─── Toolbar Buttons ───
      document.getElementById('btnStream').addEventListener('click', toggleStream);
      document.getElementById('btnRefresh').addEventListener('click', () => {
        send({ type: 'refresh' });
        showToast('📸 Screenshot');
      });
      document.getElementById('btnKeyboard').addEventListener('click', () => {
        keyInput.focus();
        showToast('⌨️ Bàn phím');
      });
      document.getElementById('btnReconnect').addEventListener('click', () => {
        send({ type: 'connect' });
        showToast('🔄 Reconnecting...');
      });
      document.getElementById('btnEnter').addEventListener('click', () => {
        const text = keyInput.value.trim();
        if (text) {
          send({ type: 'key', text });
          send({ type: 'key', key: 'Enter', code: 'Enter' });
          keyInput.value = '';
        } else {
          send({ type: 'key', key: 'Enter', code: 'Enter' });
        }
      });

      function toggleStream() {
        state.streaming = !state.streaming;
        const btn = document.getElementById('btnStream');
        if (state.streaming) {
          send({ type: 'stream-start' });
          btn.classList.add('active');
          btn.querySelector('.material-icons-round').textContent = 'stop';
          showToast('▶ Stream bắt đầu');
        } else {
          send({ type: 'stream-stop' });
          btn.classList.remove('active');
          btn.querySelector('.material-icons-round').textContent = 'play_arrow';
          showToast('⏹ Stream dừng');
        }
      }

      // ─── Helpers ───
      function send(obj) {
        if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
      }

      function showCursor(x, y) {
        const rect = container.getBoundingClientRect();
        cursorDot.style.left = (x - rect.left) + 'px';
        cursorDot.style.top = (y - rect.top) + 'px';
        cursorDot.style.display = 'block';
      }

      function hideCursor() {
        cursorDot.style.display = 'none';
      }

      function showTapRing(x, y) {
        const rect = container.getBoundingClientRect();
        const ring = document.createElement('div');
        ring.className = 'tap-ring';
        ring.style.left = (x - rect.left) + 'px';
        ring.style.top = (y - rect.top) + 'px';
        container.appendChild(ring);
        setTimeout(() => ring.remove(), 500);
      }

      let toastTimer = null;
      function showToast(text) {
        const el = document.getElementById('toast');
        el.textContent = text;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
      }

      // ─── Start ───
      connect();
    })();
  </script>
</body>

</html>
